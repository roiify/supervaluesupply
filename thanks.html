<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Thanks — Super Value Supply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:#f4f2f7;color:#20222b;font-family:"Inter",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
  .card{max-width:520px}
  .badge{width:74px;height:74px;border-radius:50%;background:#e6f6ee;color:#0f9d58;display:grid;place-items:center;margin:0 auto 1.6rem;font-size:2.1rem;font-weight:800}
  h1{font-family:"Anton",sans-serif;text-transform:uppercase;font-size:clamp(2.2rem,7vw,3.4rem);line-height:1;margin-bottom:1rem}
  p{color:#5b5566;font-size:1.1rem;line-height:1.6;margin-bottom:2rem}
  a{display:inline-block;background:#241d33;color:#fff;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:.9rem;padding:1rem 1.9rem;border-radius:10px;text-decoration:none}
  a:hover{background:#2f2745}
</style>
</head>
<body>
  <div class="card">
    <div class="badge">✓</div>
    <h1>You're in.</h1>
    <p>Thanks — we got it. Watch your inbox: we'll send your free growth audit within 2 business days.</p>
    <a href="/">Back to home</a>
  </div>
</body>
</html>
