<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Page not found — Super Value Supply</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0}
  body{background:#f4f2f7;color:#20222b;font-family:"Inter",system-ui,sans-serif;min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem}
  .card{max-width:520px}
  .code{font-family:"Anton",sans-serif;font-size:clamp(4rem,16vw,7rem);line-height:1;color:#5b4b8a}
  h1{font-family:"Anton",sans-serif;text-transform:uppercase;font-size:clamp(1.8rem,5vw,2.6rem);line-height:1;margin:.4rem 0 1rem}
  p{color:#5b5566;font-size:1.1rem;line-height:1.6;margin-bottom:2rem}
  a{display:inline-block;background:#241d33;color:#fff;font-weight:800;text-transform:uppercase;letter-spacing:.04em;font-size:.9rem;padding:1rem 1.9rem;border-radius:10px;text-decoration:none}
  a:hover{background:#2f2745}
</style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>That page doesn't exist. Let's get you back to growing your business.</p>
    <a href="/">Back to home</a>
